<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Герой-Клікер</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh; display: flex; justify-content: center; align-items: center;
  color: #fff; overflow: hidden;
}
.game { width: 100%; max-width: 400px; padding: 10px; text-align: center; position: relative; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; margin-bottom: 6px; }
.res { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 6px 14px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.res .icon { font-size: 16px; }
.level-badge { background: rgba(255,215,0,0.2); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 6px 14px; font-size: 13px; font-weight: 600; color: #ffd700; }

/* Enemy Area */
.enemy-area { 
  background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px 10px; margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.05); position: relative; min-height: 200px;
}
.enemy-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #ff6b6b; }
.enemy-hp-bar { width: 100%; height: 16px; background: rgba(255,0,0,0.2); border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
.enemy-hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6b6b); border-radius: 10px; transition: width 0.2s; }
.enemy-hp-text { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
.enemy-sprite { font-size: 64px; margin: 8px 0; cursor: pointer; transition: transform 0.1s; display: inline-block; }
.enemy-sprite:active { transform: scale(1.2); }

/* Damage popup */
.dmg-popup {
  position: fixed; pointer-events: none; font-size: 24px; font-weight: 800;
  color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5);
  animation: floatUp 0.8s ease-out forwards; z-index: 100;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 8px; }
.stat-box { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 8px 4px; }
.stat-val { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* Shop */
.shop-title { font-size: 14px; font-weight: 600; margin: 6px 0; color: #ffd700; }
.shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.shop-item {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 10px 6px; cursor: pointer; transition: all 0.2s;
}
.shop-item:active { transform: scale(0.95); background: rgba(255,255,255,0.12); }
.shop-item .name { font-size: 12px; font-weight: 600; }
.shop-item .desc { font-size: 10px; color: rgba(255,255,255,0.5); margin: 2px 0; }
.shop-item .price { font-size: 12px; color: #ffd700; font-weight: 600; }
.shop-item .level { font-size: 10px; color: rgba(255,255,255,0.3); }
.shop-item.locked { opacity: 0.5; }

/* Floating coins */
.coin-float {
  position: fixed; pointer-events: none; font-size: 18px;
  animation: coinFly 0.6s ease-out forwards; z-index: 99;
}
@keyframes coinFly {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
}

/* Kill effect */
@keyframes enemyDie {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.5; }
  100% { transform: scale(0); opacity: 0; }
}
.enemy-die { animation: enemyDie 0.4s ease-out forwards; }
</style>
</head>
<body>
<div class="game" id="app">
  <div class="header">
    <div class="res"><span class="icon">🪙</span><span id="goldDisplay">0</span></div>
    <div class="level-badge">🔰 Рівень <span id="playerLevel">1</span></div>
    <div class="res"><span class="icon">💀</span><span id="killsDisplay">0</span></div>
  </div>

  <div class="enemy-area" id="enemyArea">
    <div class="enemy-name" id="enemyName">🍄 Гриб-Слизень</div>
    <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpFill" style="width:100%"></div></div>
    <div class="enemy-hp-text" id="enemyHpText">100/100</div>
    <div class="enemy-sprite" id="enemySprite">🍄</div>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="stat-val" id="dmgDisplay">1</div><div class="stat-label">⚔️ Атака</div></div>
    <div class="stat-box"><div class="stat-val" id="clickPower">1</div><div class="stat-label">🖱 За клік</div></div>
    <div class="stat-box"><div class="stat-val" id="dpsDisplay">1</div><div class="stat-label">⚡ DPS</div></div>
  </div>

  <div class="shop-title">🏪 Крамниця</div>
  <div class="shop-grid" id="shopGrid"></div>
</div>

<script>
// ========== GAME DATA ==========
const ENEMIES = [
  { name: '🍄 Гриб-Слизень', hp: 100, gold: 10, sprite: '🍄', level: 1 },
  { name: '🐺 Лісовий Вовк', hp: 250, gold: 25, sprite: '🐺', level: 3 },
  { name: '🦴 Скелетон', hp: 500, gold: 50, sprite: '💀', level: 5 },
  { name: '🦎 Ящер-Воїн', hp: 1200, gold: 100, sprite: '🦎', level: 8 },
  { name: '👹 Огр', hp: 3000, gold: 200, sprite: '👹', level: 12 },
  { name: '🐉 Дракон', hp: 8000, gold: 500, sprite: '🐉', level: 20 },
  { name: '👾 Темний Лорд', hp: 20000, gold: 1200, sprite: '👾', level: 35 },
  { name: '🌀 Хаос-Бос', hp: 50000, gold: 3000, sprite: '🌀', level: 50 },
];

const UPGRADES = [
  { id: 'atk', name: '⚔️ Меч', desc: 'Атака +1', baseCost: 10, costMult: 1.4, maxLvl: 50, effect: () => { g.playerDmg++; } },
  { id: 'click', name: '🖱️ Рука', desc: 'Клік +1', baseCost: 15, costMult: 1.5, maxLvl: 30, effect: () => { g.clickDmg++; } },
  { id: 'crit', name: '💥 Крит', desc: 'Шанс криту +2%', baseCost: 50, costMult: 1.6, maxLvl: 25, effect: () => { g.critChance = Math.min(g.critChance + 0.02, 0.8); } },
  { id: 'gold', name: '🪙 Золото', desc: 'Золото +20%', baseCost: 75, costMult: 1.7, maxLvl: 20, effect: () => { g.goldMult *= 1.2; } },
  { id: 'aspd', name: '⏱️ Швидкість', desc: 'Авто-атака +0.5/c', baseCost: 100, costMult: 1.8, maxLvl: 20, effect: () => { g.autoSpeed += 0.5; } },
  { id: 'hp', name: '❤️ Досвід', desc: 'Боси швидше', baseCost: 200, costMult: 2, maxLvl: 10, effect: () => { g.expMult *= 1.15; } },
];

const SPRITES = ['🍄','🐺','💀','🦎','👹','🐉','👾','🌀'];

// ========== SAVE ==========
let g;

function defaultGame() {
  return {
    gold: 0, kills: 0, playerLevel: 1, totalDmg: 0,
    playerDmg: 1, clickDmg: 1, critChance: 0.05,
    goldMult: 1, autoSpeed: 1, expMult: 1,
    upgrades: {}, enemyIdx: 0, enemyHp: 100, enemyMaxHp: 100,
    highScore: 0,
  };
}

function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem('heroClicker'));
    if (d && typeof d.gold === 'number') { g = d; return; }
  } catch(e) {}
  g = defaultGame();
}

function saveGame() {
  try { localStorage.setItem('heroClicker', JSON.stringify(g)); } catch(e) {}
}

loadGame();

// ========== DOM ==========
const $ = id => document.getElementById(id);
const goldDisplay = $('goldDisplay');
const killsDisplay = $('killsDisplay');
const playerLevel = $('playerLevel');
const enemyName = $('enemyName');
const enemyHpFill = $('enemyHpFill');
const enemyHpText = $('enemyHpText');
const enemySprite = $('enemySprite');
const dmgDisplay = $('dmgDisplay');
const clickPower = $('clickPower');
const dpsDisplay = $('dpsDisplay');
const shopGrid = $('shopGrid');
const enemyArea = $('enemyArea');

// ========== ENEMY ==========
function getEnemy() {
  let idx = g.enemyIdx;
  if (idx >= ENEMIES.length) idx = ENEMIES.length - 1;
  return ENEMIES[idx];
}

function spawnEnemy() {
  const e = getEnemy();
  const mult = 1 + (g.kills * 0.02);
  g.enemyMaxHp = Math.floor(e.hp * mult);
  g.enemyHp = g.enemyMaxHp;
  enemyName.textContent = e.name;
  enemySprite.textContent = e.sprite;
  enemySprite.className = 'enemy-sprite';
  updateEnemyUI();
}

function updateEnemyUI() {
  const pct = Math.max(0, (g.enemyHp / g.enemyMaxHp) * 100);
  enemyHpFill.style.width = pct + '%';
  enemyHpText.textContent = Math.max(0, Math.ceil(g.enemyHp)) + '/' + g.enemyMaxHp;
}

function spawnDamagePopup(dmg, x, y, color) {
  const el = document.createElement('div');
  el.className = 'dmg-popup';
  el.textContent = dmg > 0 ? '-' + Math.floor(dmg) : 'MISS';
  if (color) el.style.color = color;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function spawnCoinPopup(x, y, amt) {
  const el = document.createElement('div');
  el.className = 'coin-float';
  el.textContent = '🪙 +' + Math.floor(amt);
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function dealDamage(dmg, isCrit) {
  g.enemyHp -= dmg;
  g.totalDmg += dmg;
  
  const rect = enemySprite.getBoundingClientRect();
  const x = rect.left + rect.width/2 - 20;
  const y = rect.top;
  
  if (isCrit) spawnDamagePopup(dmg, x, y, '#ff4444');
  else spawnDamagePopup(dmg, x, y, '#ffd700');
  
  if (g.enemyHp <= 0) {
    const e = getEnemy();
    const goldReward = Math.floor(e.gold * g.goldMult * (1 + g.kills * 0.01));
    g.gold += goldReward;
    g.kills++;
    
    // Level up every 10 kills
    const newLevel = Math.floor(g.kills / 10) + 1;
    if (newLevel > g.playerLevel) {
      g.playerLevel = newLevel;
    }
    
    spawnCoinPopup(rect.left + rect.width/2, rect.top, goldReward);
    enemySprite.className = 'enemy-sprite enemy-die';
    
    setTimeout(() => {
      // Check if should advance enemy
      const maxIdx = Math.min(Math.floor(g.kills / 15), ENEMIES.length - 1);
      if (g.enemyIdx < maxIdx) g.enemyIdx++;
      spawnEnemy();
    }, 400);
  }
  
  updateEnemyUI();
}

// ========== CLICK ==========
enemySprite.addEventListener('click', (e) => {
  let dmg = g.clickDmg + g.playerDmg;
  let isCrit = Math.random() < g.critChance;
  if (isCrit) dmg *= 3;
  dealDamage(dmg, isCrit);
});

enemySprite.addEventListener('touchstart', (e) => {
  let dmg = g.clickDmg + g.playerDmg;
  let isCrit = Math.random() < g.critChance;
  if (isCrit) dmg *= 3;
  dealDamage(dmg, isCrit);
});

// ========== AUTO ATTACK ==========
let lastAuto = 0;
function autoAttack(timestamp) {
  if (!lastAuto) lastAuto = timestamp;
  if (timestamp - lastAuto >= 1000 / g.autoSpeed) {
    const dmg = g.playerDmg;
    dealDamage(dmg, false);
    lastAuto = timestamp;
  }
  requestAnimationFrame(autoAttack);
}
requestAnimationFrame(autoAttack);

// ========== SHOP ==========
function renderShop() {
  shopGrid.innerHTML = '';
  UPGRADES.forEach(u => {
    const lvl = g.upgrades[u.id] || 0;
    const cost = Math.floor(u.baseCost * Math.pow(u.costMult, lvl));
    const maxed = lvl >= u.maxLvl;
    const canAfford = g.gold >= cost;
    
    const div = document.createElement('div');
    div.className = 'shop-item' + (maxed ? ' locked' : '');
    
    div.innerHTML = `
      <div class="name">${u.name}</div>
      <div class="desc">${u.desc}${maxed ? ' (MAX)' : ''}</div>
      <div class="price">${maxed ? '✅ MAX' : '🪙 ' + cost}</div>
      <div class="level">Рівень ${lvl}/${u.maxLvl}</div>
    `;
    
    if (!maxed) {
      div.addEventListener('click', () => {
        if (g.gold >= cost) {
          g.gold -= cost;
          g.upgrades[u.id] = (g.upgrades[u.id] || 0) + 1;
          u.effect();
          saveGame();
          updateUI();
          renderShop();
        }
      });
      if (!canAfford) div.style.opacity = '0.4';
    }
    
    shopGrid.appendChild(div);
  });
}

// ========== UI UPDATE ==========
function updateUI() {
  goldDisplay.textContent = Math.floor(g.gold);
  killsDisplay.textContent = g.kills;
  playerLevel.textContent = g.playerLevel;
  
  const totalClick = g.clickDmg + g.playerDmg;
  dmgDisplay.textContent = g.playerDmg;
  clickPower.textContent = totalClick;
  dpsDisplay.textContent = g.autoSpeed.toFixed(1);
}

// ========== TELEGRAM INTEGRATION ==========
try {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
} catch(e) {}

// ========== INIT ==========
spawnEnemy();
renderShop();
updateUI();

// Auto-save every 10 sec
setInterval(saveGame, 10000);

// Save on page hide
document.addEventListener('visibilitychange', () => {
  if (document.hidden) saveGame();
});

console.log('⚔️ Hero Clicker loaded!');
</script>
</body>
</html>
